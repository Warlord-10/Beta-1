# Local observability stack for Beta-1.
#
#   App ──OTLP/HTTP──▶ OTel Collector ──▶ Prometheus (metrics)
#                                     └──▶ Tempo      (traces)
#                                              ▲
#                                              └── Grafana (dashboards)
#
# Usage:
#   cd observability && docker compose up -d
#   Grafana:    http://localhost:3000  (anonymous admin, no login)
#   Then set SETTINGS.OBSERVABILITY_ENABLED = true and run the app.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (the app exports here)
    depends_on:
      - prometheus
      - tempo

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=otlp-write-receiver"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"   # Tempo query API

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
